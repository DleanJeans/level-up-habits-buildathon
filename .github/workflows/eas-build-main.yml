name: EAS Android Build for Main Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ota-update:
    name: Send OTA Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send OTA Update
        run: |
          eas update --branch production --message "Production update from commit ${{ github.sha }}"

  build-and-release:
    name: Build APK and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK locally
        run: eas build --platform android --profile preview --local --non-interactive --output ./level-up-habits.apk

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}-build.${{ github.run_number }}
          name: Release v${{ steps.package-version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Android APK Release

            **Version:** ${{ steps.package-version.outputs.version }}
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Changes
            ${{ github.event.head_commit.message }}

            Download the APK below to install on Android devices.
          files: ./level-up-habits.apk
          draft: false
          prerelease: false
