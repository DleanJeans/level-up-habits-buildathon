name: Cleanup Merged PR Branches

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all merged PR branches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get all closed/merged PRs
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'closed',
              per_page: 100,
            });

            const mergedPulls = pulls.filter(pr => pr.merged_at !== null);
            console.log(`Found ${mergedPulls.length} merged PRs`);

            for (const pr of mergedPulls) {
              const branch = pr.head.ref;
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                console.log(`Deleted branch: ${branch} (PR #${pr.number})`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Branch already deleted: ${branch} (PR #${pr.number})`);
                } else {
                  console.log(`Failed to delete ${branch}: ${e.message}`);
                }
              }
            }
